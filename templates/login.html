{% extends "base.html" %}
{% block title %}Log In — Job Finder Portal{% endblock %}
{% block content %}
<h1>Log In</h1>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="post" action="/login">
  <label for="email">Email address</label>
  <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>

  <label for="password">Password</label>
  <input type="password" id="password" name="password" required>

  <button class="btn" type="submit">Log in</button>
</form>
<p class="muted" style="margin-top:1rem; text-align:center;">
  <a href="/forgot-password">Forgot password?</a>
</p>
<p class="muted" style="margin-top:0.5rem; text-align:center;">
  Don't have an account? <a href="/signup">Enter an invite code</a>
</p>
{% endblock %}
