<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Job Finder Portal{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #0f1117; color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0; padding: 2rem 1rem;
    }
    .container { max-width: 520px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #a0aec0; }
    label { display: block; font-size: 0.85rem; color: #a0aec0; margin-bottom: 0.3rem; }
    input, textarea {
      width: 100%; padding: 0.6rem 0.8rem;
      background: #1a202c; border: 1px solid #2d3748;
      border-radius: 6px; color: #f7fafc; font-size: 1rem;
      margin-bottom: 1rem;
    }
    textarea { min-height: 120px; resize: vertical; font-family: inherit; }
    .btn {
      background: #5b6ef5; color: #fff; border: none;
      padding: 0.7rem 1.4rem; border-radius: 6px;
      font-size: 1rem; cursor: pointer; width: 100%;
    }
    .btn:hover { background: #4a5de0; }
    .error {
      background: #4a1818; color: #feb2b2;
      border: 1px solid #822727; border-radius: 6px;
      padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 0.9rem;
    }
    a { color: #63b3ed; }
    .muted { color: #4a5568; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    {% if current_user %}
    <div style="display:flex; justify-content:flex-end; gap:1.2rem; margin-bottom:1.5rem;">
      <a href="/feedback" style="color:#a0aec0; font-size:0.85rem; text-decoration:none;">Feedback</a>
      <a href="/logout" style="color:#f7fafc; font-weight:700; font-size:0.85rem; text-decoration:none;">Log out</a>
    </div>
    {% endif %}
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
          <div class="error">{{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
