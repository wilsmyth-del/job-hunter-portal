{% extends "base.html" %}
{% block title %}Reset Password — Job Finder Portal{% endblock %}
{% block content %}
<h1>Reset Password</h1>
{% if not valid %}
  <p>This reset link is invalid or has expired.</p>
  <p class="muted" style="margin-top:1rem;"><a href="/forgot-password">Request a new one</a></p>
{% else %}
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label for="password">New password <span class="muted">(at least 8 characters)</span></label>
    <input type="password" id="password" name="password" required minlength="8" autofocus>

    <label for="confirm_password">Confirm new password</label>
    <input type="password" id="confirm_password" name="confirm_password" required minlength="8">

    <button class="btn" type="submit">Set new password</button>
  </form>
{% endif %}
{% endblock %}
