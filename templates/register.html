{% extends "base.html" %}
{% block title %}Create Account — Job Finder Portal{% endblock %}
{% block content %}
<h1>Create Your Account</h1>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="POST" action="/register">
  <input type="hidden" name="invite_code" value="{{ invite_code }}">

  <label for="name">Your Name</label>
  <input type="text" id="name" name="name" autofocus required>

  <label for="email">Email Address</label>
  <input type="email" id="email" name="email" placeholder="you@email.com" required>

  <label for="location">Location <span class="muted">(city or region, e.g. Vancouver, BC)</span></label>
  <input type="text" id="location" name="location" required>

  <label for="password">Password <span class="muted">(at least 8 characters)</span></label>
  <input type="password" id="password" name="password" required minlength="8">

  <label for="confirm_password">Confirm Password</label>
  <input type="password" id="confirm_password" name="confirm_password" required minlength="8">

  <button class="btn" type="submit">Create Account</button>
</form>
{% endblock %}
